<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catering Services | Biryani Grill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="site-shell" data-page="Catering">
  <div id="site-header"></div>
  <main>
<section class="max-w-4xl mx-auto px-4 py-20 fade-up">
<h1 class="heading-font text-5xl text-center">Catering <span class="gold-text">Services</span></h1><p class="text-center text-zinc-300 mt-4">Let us make your special occasion memorable with authentic Indian cuisine.</p>
<form id="catering-form" class="panel border border-yellow-500/20 rounded-2xl p-6 mt-10 grid md:grid-cols-2 gap-4">
<input class="input-ui" name="name" placeholder="Name *" required><input class="input-ui" name="email" type="email" placeholder="Email *" required><input class="input-ui md:col-span-2" name="phone" placeholder="Phone *" required><select class="select-ui" name="location" required><option value="">Select location</option><option>Aldie</option><option>Ashburn</option><option>Chantilly</option></select><select class="select-ui" name="serviceType" required><option value="">Type of Service</option><option>Corporate</option><option>Private Event</option><option>Wedding</option></select><input class="input-ui" type="date" name="eventDate" required><input class="input-ui" type="time" name="eventTime" required><input class="input-ui md:col-span-2" name="guests" placeholder="Expected number of guests *" required><textarea class="textarea-ui md:col-span-2" name="specialRequests" rows="4" placeholder="Menu preferences, dietary restrictions, setup details..."></textarea><button class="btn-gold md:col-span-2 rounded-lg px-5 py-3">Request Catering Quote</button><p id="catering-msg" class="md:col-span-2 text-sm text-yellow-300"></p>
</form>
</section></main>
  <div id="site-footer"></div>
  <script defer src="main.js"></script>
</body>
</html>
