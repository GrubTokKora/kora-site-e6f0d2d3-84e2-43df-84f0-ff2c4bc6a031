<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Franchise Inquiry | Biryani Grill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="site-shell" data-page="Franchise">
  <div id="site-header"></div>
  <main>
<section class="max-w-4xl mx-auto px-4 py-20 fade-up">
<h1 class="heading-font text-5xl text-center">Join the <span class="gold-text">Biryani Grill Family</span></h1><p class="text-center text-zinc-300 mt-4">We invite passionate entrepreneurs to join us in expanding our brand.</p>
<form id="franchise-form" class="panel border border-yellow-500/20 rounded-2xl p-6 mt-10 grid md:grid-cols-2 gap-4">
<input class="input-ui" name="fullName" placeholder="Full Name *" required><input class="input-ui" name="email" type="email" placeholder="Email *" required><input class="input-ui md:col-span-2" name="phone" placeholder="Phone *" required><input class="input-ui" name="city" placeholder="City *" required><input class="input-ui" name="state" placeholder="State *" required><select class="select-ui" name="investment" required><option value="">Investment Capacity *</option><option>$100k - $250k</option><option>$250k - $500k</option><option>$500k+</option></select><select class="select-ui" name="experience"><option>No Experience</option><option>1-3 years</option><option>3-5 years</option><option>5+ years</option></select><textarea class="textarea-ui md:col-span-2" name="message" rows="4" placeholder="Tell us why you want to join the Biryani Grill family..."></textarea><button class="btn-gold md:col-span-2 rounded-lg px-5 py-3">Submit Franchise Inquiry</button><p id="franchise-msg" class="md:col-span-2 text-sm text-yellow-300"></p>
</form>
</section></main>
  <div id="site-footer"></div>
  <script defer src="main.js"></script>
</body>
</html>
